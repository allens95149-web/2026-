<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 英美回娘家籃球交流賽</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { font-family: sans-serif; overflow: hidden; background: linear-gradient(135deg, #050812 0%, #001F3F 100%); color: #fff; }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px; }
    .glass-card-lg { background: rgba(10, 15, 31, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 20px; }
    .btn-primary { background: linear-gradient(135deg, #FFD700 0%, #ffc107 100%); color: #000; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .btn-danger { background: #ef4444; color: #fff; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .btn-success { background: #22c55e; color: #000; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-base { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 0.75rem; border-radius: 8px; width: 100%; text-align: center; font-size: 1.2rem; font-weight: bold; }
    .score-display { font-size: 2.5rem; font-weight: 900; color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    nav { display: flex; overflow-x: auto; padding-bottom: 5px; } nav::-webkit-scrollbar { display: none; }
    .nav-tab { white-space: nowrap; padding: 0.75rem 1.5rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 600; cursor: pointer; }
    .nav-tab.active { background: #FFD700; color: #000; }
    .hidden-page { display: none !important; }
    .staff-only { display: none !important; } .player-only { display: none !important; }
    body.staff-mode .staff-only { display: flex !important; } body.staff-mode main.staff-only { display: block !important; }
    body.player-mode { background: #f8fafc !important; color: #0f172a; }
    body.player-mode .player-only { display: flex !important; } body.player-mode main.player-only { display: block !important; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; items: center; justify-content: center; }
  </style>
</head>
<body class="h-full w-full staff-mode">

  <div id="role-overlay" class="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center">
   <div class="glass-card-lg p-8 max-w-md w-full mx-4 animate-slideInUp text-center">
    <h2 class="text-3xl font-bold text-yellow-400 mb-2">籃球交流賽</h2>
    <p class="text-gray-400 mb-8">系統入口</p>
    <div class="space-y-4">
        <button id="role-staff" class="w-full btn-primary py-4 text-xl">👨‍💻 工作人員 (寫入)</button> 
        <button id="role-player" class="w-full btn-secondary py-4 text-xl">🏀 球員觀看 (唯讀)</button>
    </div>
   </div>
  </div>

  <header class="staff-only bg-black/40 border-b border-white/10 px-4 py-3 shrink-0 justify-between items-center">
    <h1 class="text-lg font-bold text-yellow-400">🏀 後台管理系統</h1>
    <div class="text-xs font-bold text-green-500 animate-blink border border-green-500/30 px-3 py-1 rounded-full">🟢 已連線</div>
  </header>
  <nav class="staff-only bg-black/20 border-b border-white/10 px-4 py-2 shrink-0 gap-2" id="staff-nav">
       <button class="nav-tab active" data-page="0">首頁/日誌</button> 
       <button class="nav-tab" data-page="1">趣味競賽</button> 
       <button class="nav-tab" data-page="2">三分球</button> 
       <button class="nav-tab" data-page="3">五五賽</button> 
       <button class="nav-tab" data-page="4">頒獎台</button>
  </nav>

  <main id="staff-main" class="staff-only flex-1 overflow-auto p-4 w-full max-w-7xl mx-auto">
     <section id="page-0" class="page">
      <div class="glass-card p-6 mb-6">
       <h3 class="text-2xl font-bold text-yellow-400 mb-4 text-center">🏆 隊伍總積分</h3>
       <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
        <div class="bg-blue-500/20 p-4 rounded"><div class="text-gray-300 mb-2">Team A</div><div class="score-display" id="dash-a">0</div></div>
        <div class="bg-red-500/20 p-4 rounded"><div class="text-gray-300 mb-2">Team B</div><div class="score-display" id="dash-b">0</div></div>
        <div class="bg-green-500/20 p-4 rounded"><div class="text-gray-300 mb-2">Team C</div><div class="score-display" id="dash-c">0</div></div>
       </div>
      </div>
      <div class="glass-card p-4 border border-gray-600">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-yellow-400">📝 操作日誌</h3>
            <button class="btn-secondary text-xs p-2" onclick="clearLog()">清除</button>
        </div>
        <div id="sys-logs" class="h-48 overflow-y-auto font-mono text-sm text-gray-400 space-y-1">系統啟動...</div>
      </div>
     </section>

     <section id="page-1" class="page hidden-page">
      <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-yellow-400">🎲 趣味競賽</h2>
          <button class="btn-danger p-2" onclick="resetData('dice')">🧹 清除重置</button>
      </div>
      <div class="glass-card p-6 mb-6 text-center">
         <h3 id="dice-team" class="text-3xl font-bold text-yellow-400 mb-2">Team A (第1輪)</h3>
         <div id="dice-timer" class="text-6xl text-yellow-400 font-mono mb-6">00:00.0</div>
         <div class="flex gap-2 justify-center mb-6">
             <button id="d-start" class="btn-primary w-32">▶️ 開始</button>
             <button id="d-stop" class="btn-secondary w-32" disabled>⏹️ 停止</button>
         </div>
         <button id="d-next" class="btn-primary">⏭️ 下一隊</button>
         <button id="d-r2" class="btn-success hidden">▶️ 第二輪</button>
         <button id="d-fin" class="btn-danger hidden">🏆 結算成績</button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="dice-scores"></div>
     </section>

     <section id="page-2" class="page hidden-page">
      <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-yellow-400">🧱 三分球</h2>
          <button class="btn-danger p-2" onclick="resetData('3pt')">🧹 清除重置</button>
      </div>
      <div id="pt-r1">
          <button id="pt-r1-fin" class="btn-success w-full mb-4">✅ 結算小組賽 (取前兩名)</button>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="pt-inputs"></div>
      </div>
      <div id="pt-fin" class="hidden">
          <button id="pt-f-fin" class="btn-danger w-full mb-4">🏆 結算決賽</button>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="pt-f-inputs"></div>
      </div>
     </section>

     <section id="page-3" class="page hidden-page">
      <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-yellow-400">⚔️ 五五賽</h2>
          <button class="btn-danger p-2" onclick="resetData('5v5')">🧹 清除重置</button>
      </div>
      <div class="flex gap-2 justify-center mb-4">
        <button class="btn-secondary f-match active" data-m="ab">A vs B</button>
        <button class="btn-secondary f-match" data-m="ac">A vs C</button>
        <button class="btn-secondary f-match" data-m="bc">B vs C</button>
      </div>
      <div class="glass-card p-6 text-center mb-4">
         <div class="text-xl text-gray-400 mb-2" id="f-half">上半場</div>
         <div class="text-6xl text-yellow-400 font-mono mb-4" id="f-time">10:00</div>
         <button id="f-toggle" class="btn-primary w-full mb-6">▶️ 啟動/暫停計時</button>
         
         <div class="flex justify-between items-center">
             <div class="flex-1"><div id="f-t1" class="text-2xl text-blue-400 font-bold mb-2">Team A</div><div id="f-s1" class="text-6xl text-blue-400 font-bold mb-4">0</div>
                 <div class="flex flex-wrap justify-center gap-1"><button class="btn-primary p-2" onclick="addF(1,1)">+1</button><button class="btn-primary p-2" onclick="addF(1,2)">+2</button><button class="btn-primary p-2 bg-orange-500" onclick="addF(1,3)">+3</button><button class="btn-secondary p-2" onclick="addF(1,-1)">-1</button></div>
             </div>
             <div class="px-4 text-3xl font-black text-gray-500">VS<br><button class="text-sm btn-secondary mt-4" onclick="resF()">歸零</button></div>
             <div class="flex-1"><div id="f-t2" class="text-2xl text-red-400 font-bold mb-2">Team B</div><div id="f-s2" class="text-6xl text-red-400 font-bold mb-4">0</div>
                 <div class="flex flex-wrap justify-center gap-1"><button class="btn-primary p-2" onclick="addF(2,1)">+1</button><button class="btn-primary p-2" onclick="addF(2,2)">+2</button><button class="btn-primary p-2 bg-orange-500" onclick="addF(2,3)">+3</button><button class="btn-secondary p-2" onclick="addF(2,-1)">-1</button></div>
             </div>
         </div>
      </div>
      <button id="f-fin" class="btn-success w-full">✅ 結算此場並累加</button>
     </section>

     <section id="page-4" class="page hidden-page text-center">
        <div id="pod-lock" class="py-20 cursor-pointer" onclick="forceUnlock()">
            <div class="text-6xl mb-4">🔒</div><div class="text-2xl text-red-400">賽事未全數結算</div><div class="text-gray-400">(點擊強制解鎖)</div>
        </div>
        <div id="pod-show" class="hidden glass-card p-8">
            <div class="text-6xl mb-4">🥇</div><div id="p1" class="text-3xl text-yellow-400 font-bold"></div><div id="p1s" class="text-xl mb-8"></div>
            <div class="flex justify-around text-xl"><div id="p2"></div><div id="p3"></div></div>
        </div>
     </section>
  </main>

  <div id="player-view" class="player-only w-full h-full flex-col fixed inset-0 z-[1000] bg-slate-50 overflow-y-auto text-slate-800">
    <header class="bg-indigo-600 text-white px-4 py-3 flex justify-between items-center shadow-md sticky top-0 z-50 shrink-0">
       <div class="font-bold">🏀 球員觀賽 <span class="text-[10px] bg-green-400 text-black px-2 rounded-full animate-pulse">實時同步</span></div>
       <button id="p-back" class="text-xs bg-white/20 px-3 py-1 rounded">👨‍💻 返回</button>
    </header>
    <nav class="bg-white border-b px-2 py-3 flex gap-2 overflow-x-auto shadow-sm shrink-0" id="player-nav">
        <button class="nav-tab active !text-indigo-600 border-indigo-200" data-page="0">首頁</button> 
        <button class="nav-tab !text-slate-600 border-gray-200" data-page="1">趣味</button> 
        <button class="nav-tab !text-slate-600 border-gray-200" data-page="2">三分</button> 
        <button class="nav-tab !text-slate-600 border-gray-200" data-page="3">五五</button> 
        <button class="nav-tab !text-slate-600 border-gray-200" data-page="4">頒獎</button>
    </nav>
    <main class="p-4" id="p-content"></main>
  </div>

  <script>
    // ============ 核心變數 ============
    let r='staff', step=0, logs=[];
    let dSt={r:1, i:0}, tInt=null, tMs=0, tRun=false;
    let w={A:0, B:0, C:0}, m={d:null, p3:null, f:null}, fSt={d:false, p3:false, f:false, u:false};
    let fM={
      ab:{s1:0,s2:0,h:1,t1:600,t2:600}, ac:{s1:0,s2:0,h:1,t1:600,t2:600}, bc:{s1:0,s2:0,h:1,t1:600,t2:600}
    };
    let fC='ab', fInt=null, fRun=false;
    let gd={
      d:{A:[0,0],B:[0,0],C:[0,0]},
      p3:{r1:{A:{p:Array(10).fill(0),t:0},B:{p:Array(10).fill(0),t:0},C:{p:Array(10).fill(0),t:0}}, f:{q:[],t:{}}},
      f:{A:0,B:0,C:0}
    };
    const tm=['A','B','C']; let pTab=0;

    // 工具
    const $=(id)=>document.getElementById(id);
    const set=(id,v)=>{if($(id))$(id).textContent=v;};
    const fmt=(ms)=>{if(!ms)return'--:--.-';let m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),ml=Math.floor((ms%1000)/100);return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${ml}`;};
    
    // 日誌
    function log(m){ if(r!=='staff')return; let d=new Date(); logs.unshift(`[${d.getHours()}:${d.getMinutes()}:${d.getSeconds()}] ${m}`); if(logs.length>30)logs.pop(); renderLogs(); sync(); }
    function renderLogs(){ if($('sys-logs'))$('sys-logs').innerHTML=logs.map(x=>`<div>${x}</div>`).join('')||'無紀錄'; }
    function clearLog(){ if(confirm('清空日誌？')){logs=[];renderLogs();sync();} }

    // Firebase
    const fbC = { apiKey: "AIzaSyCbHTwcgiHHWgIyZ9BD7hn3KnkI_sad3iw", authDomain: "basketball-2026.firebaseapp.com", databaseURL: "https://basketball-2026-default-rtdb.firebaseio.com", projectId: "basketball-2026" };
    let fbR=false; try{if(firebase.apps.length===0){firebase.initializeApp(fbC);fbR=true;}}catch(e){}
    function sync(){ if(fbR&&r==='staff') firebase.database().ref('yingmei').set({gd,step,w,m,fM,fC,fSt,logs,dSt}); }
    
    if(fbR){
      firebase.database().ref('yingmei').on('value',s=>{
        let d=s.val(); if(d){
          Object.assign(gd,d.gd||gd); step=d.step||0; Object.assign(w,d.w||w); Object.assign(m,d.m||m);
          Object.assign(fM,d.fM||fM); fC=d.fC||'ab'; Object.assign(fSt,d.fSt||fSt); Object.assign(dSt,d.dSt||dSt); logs=d.logs||logs;
          updateUI();
        }
      });
    }

    // 重置
    function resetData(ty){
      if(prompt('輸入 0000 清除數據')!=='0000')return;
      if(ty==='dice'){ gd.d={A:[0,0],B:[0,0],C:[0,0]}; dSt={r:1,i:0}; if(fSt.d)w[m.d]=Math.max(0,w[m.d]-1); fSt.d=false; tMs=0; isTimerRunning=false; clearInterval(tInt); $('d-r2').classList.add('hidden'); $('d-fin').classList.add('hidden'); $('d-next').classList.remove('hidden'); $('d-fin').disabled=false; log('清除趣味競賽'); }
      if(ty==='3pt'){ gd.p3={r1:{A:{p:Array(10).fill(0),t:0},B:{p:Array(10).fill(0),t:0},C:{p:Array(10).fill(0),t:0}},f:{q:[],t:{}}}; if(fSt.p3)w[m.p3]=Math.max(0,w[m.p3]-1); fSt.p3=false; $('pt-r1').classList.remove('hidden'); $('pt-fin').classList.add('hidden'); $('pt-f-fin').disabled=false; build3Pt(); log('清除三分球'); }
      if(ty==='5v5'){ fM={ab:{s1:0,s2:0,h:1,t1:600,t2:600},ac:{s1:0,s2:0,h:1,t1:600,t2:600},bc:{s1:0,s2:0,h:1,t1:600,t2:600}}; gd.f={A:0,B:0,C:0}; if(fSt.f)w[m.f]=Math.max(0,w[m.f]-1); fSt.f=false; fC='ab'; fRun=false; clearInterval(fInt); document.querySelectorAll('.f-match').forEach(b=>b.classList.remove('active')); document.querySelector('[data-m="ab"]').classList.add('active'); $('f-fin').disabled=false; log('清除五五賽'); }
      sync(); updateUI();
    }

    // 視角切換
    $('role-staff').onclick=()=>{r='staff';$('role-overlay').style.display='none';updateUI();};
    $('role-player').onclick=()=>{r='player';$('role-overlay').style.display='none';updateUI();};
    $('p-back').onclick=()=>{r='staff';updateUI();};

    document.querySelectorAll('#staff-nav .nav-tab').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('#staff-nav .nav-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active');
      document.querySelectorAll('#staff-main .page').forEach(x=>x.classList.add('hidden-page')); $(`page-${b.dataset.page}`).classList.remove('hidden-page');
    });
    document.querySelectorAll('#player-nav .nav-tab').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('#player-nav .nav-tab').forEach(x=>x.classList.remove('!text-indigo-600','border-indigo-200')); b.classList.add('!text-indigo-600','border-indigo-200');
      pTab=parseInt(b.dataset.page); renderPlayer();
    });

    // ============ 主邏輯 ============
    function updateUI(){
      document.body.className = r==='staff'?'staff-mode h-full w-full':'player-mode h-full w-full';
      if(r==='player') renderPlayer(); else renderStaff();
    }

    function renderStaff(){
      set('dash-a',w.A); set('dash-b',w.B); set('dash-c',w.C); renderLogs();
      
      // 趣味
      let ct=tm[dSt.i]; set('dice-team', `Team ${ct} (第${dSt.r}輪)`); if(!tRun&&tMs===0)set('dice-timer','00:00.0');
      let dH=''; tm.forEach(t=>{let r1=gd.d[t][0],r2=gd.d[t][1]; dH+=`<div class="glass-card p-4"><b>Team ${t}</b><br>R1: ${fmt(r1)}<br>R2: ${fmt(r2)}<br>Total: ${(r1>0&&r2>0)?fmt(r1+r2):'--'}</div>`;}); $('dice-scores').innerHTML=dH;
      if(fSt.d){$('d-fin').textContent='🔒 已結算';$('d-fin').disabled=true;}

      // 三分
      if(gd.p3.f.q.length===2){ $('pt-r1').classList.add('hidden'); $('pt-fin').classList.remove('hidden'); }
      if(fSt.p3){$('pt-f-fin').textContent='🔒 已結算';$('pt-f-fin').disabled=true;}

      // 五五
      let mC=fM[fC]; set('f-t1','Team '+fC[0].toUpperCase()); set('f-t2','Team '+fC[1].toUpperCase());
      set('f-s1',mC.s1); set('f-s2',mC.s2); set('f-half',mC.h===1?'上半場':'下半場');
      let cT=mC.h===1?mC.t1:mC.t2; set('f-time',`${String(Math.floor(cT/60)).padStart(2,'0')}:${String(cT%60).padStart(2,'0')}`);
      $('f-toggle').textContent = fRun?'⏹️ 暫停計時':(cT===0&&mC.h===2?'⏱️ 結束':'▶️ 啟動計時');
      if(fSt.f){$('f-fin').textContent='🔒 已結算';$('f-fin').disabled=true;}

      // 頒獎
      if(!fSt.u && (!fSt.d || !fSt.p3 || !fSt.f)){ $('pod-lock').classList.remove('hidden');$('pod-show').classList.add('hidden'); }
      else{ $('pod-lock').classList.add('hidden');$('pod-show').classList.remove('hidden');
        let sorted = tm.map(t=>({t,s:w[t]})).sort((a,b)=>b.s-a.s);
        set('p1',`Team ${sorted[0].t}`); set('p1s',`${sorted[0].s}局`); set('p2',`🥈 Team ${sorted[1].t} (${sorted[1].s})`); set('p3',`🥉 Team ${sorted[2].t} (${sorted[2].s})`);
      }
    }

    function renderPlayer(){
      let h='';
      if(pTab===0){
        h=`<div class="bg-white rounded-xl shadow p-6 mb-4"><h3 class="font-bold text-lg mb-4">🏆 總積分</h3><div class="flex justify-between text-xl"><span>A: <b class="text-blue-600">${w.A}</b></span><span>B: <b class="text-red-600">${w.B}</b></span><span>C: <b class="text-green-600">${w.C}</b></span></div></div>`;
      }else if(pTab===1){
        h=`<div class="bg-white rounded-xl shadow p-6 mb-4 text-center"><h3 class="font-bold">🎲 趣味競賽 (Team ${tm[dSt.i]})</h3><div class="text-5xl font-mono text-orange-500 my-4">${fmt(tMs)}</div></div><div class="bg-white rounded-xl shadow p-4">`;
        tm.forEach(t=>{let r1=gd.d[t][0],r2=gd.d[t][1]; h+=`<div class="flex justify-between border-b py-2"><span>Team ${t}</span><b>${(r1>0&&r2>0)?fmt(r1+r2):'--'}</b></div>`;}); h+='</div>';
      }else if(pTab===2){
        h=`<div class="bg-white rounded-xl shadow p-4 mb-4"><h3 class="font-bold mb-2">🧱 小組賽總分</h3><div class="flex justify-between"><b>A: ${gd.p3.r1.A.t}</b><b>B: ${gd.p3.r1.B.t}</b><b>C: ${gd.p3.r1.C.t}</b></div></div>`;
        if(gd.p3.f.q.length===2) h+=`<div class="bg-indigo-100 rounded-xl shadow p-4"><h3 class="font-bold text-indigo-700 mb-2">🏆 決賽</h3><div class="flex justify-between"><b>${gd.p3.f.q[0]}: ${gd.p3.f.t[gd.p3.f.q[0]]?.t||0}</b><b>${gd.p3.f.q[1]}: ${gd.p3.f.t[gd.p3.f.q[1]]?.t||0}</b></div></div>`;
      }else if(pTab===3){
        let mC=fM[fC], cT=mC.h===1?mC.t1:mC.t2;
        h=`<div class="bg-white rounded-xl shadow p-6 mb-4"><div class="flex justify-between text-gray-500 font-bold mb-4"><span>${mC.h===1?'上半場':'下半場'}</span><span class="text-indigo-600">${String(Math.floor(cT/60)).padStart(2,'0')}:${String(cT%60).padStart(2,'0')}</span></div><div class="flex justify-between text-center"><div class="flex-1"><div class="text-sm">Team ${fC[0].toUpperCase()}</div><div class="text-5xl font-black text-blue-600">${mC.s1}</div></div><div class="text-xl font-black text-gray-300 px-2">VS</div><div class="flex-1"><div class="text-sm">Team ${fC[1].toUpperCase()}</div><div class="text-5xl font-black text-red-600">${mC.s2}</div></div></div></div>`;
      }else{
        if(!fSt.u && (!fSt.d || !fSt.p3 || !fSt.f)) h=`<div class="text-center py-10"><div class="text-6xl mb-4">🔒</div><div class="font-bold text-gray-400">賽事鎖定中</div></div>`;
        else{ let s=tm.map(t=>({t,s:w[t]})).sort((a,b)=>b.s-a.s); h=`<div class="bg-yellow-50 rounded-xl shadow p-8 text-center"><div class="text-5xl mb-4">🥇</div><div class="text-2xl font-bold">Team ${s[0].t}</div><div class="text-indigo-600 font-black mb-4">${s[0].s} 局</div><div class="flex justify-between text-sm text-gray-600 border-t pt-4"><span>🥈 Team ${s[1].t} (${s[1].s})</span><span>🥉 Team ${s[2].t} (${s[2].s})</span></div></div>`; }
      }
      $('p-content').innerHTML = h;
    }

    // 趣味事件
    $('d-start').onclick=()=>{if(tRun)return;tRun=true;tStartTime=Date.now()-tMs;$('d-start').disabled=true;$('d-stop').disabled=false;log('開始計時');tInt=setInterval(()=>{tMs=Date.now()-tStartTime;set('dice-timer',fmt(tMs));},50);};
    $('d-stop').onclick=()=>{if(!tRun)return;tRun=false;clearInterval(tInt);gd.d[tm[dSt.i]][dSt.r-1]=tMs;$('d-start').disabled=false;$('d-stop').disabled=true;log('停止計時');sync();updateUI();};
    $('d-roll').onclick=()=>{let r=Math.floor(Math.random()*6)+1;$('dice-display').textContent=r;log('骰出 '+r);};
    $('d-next').onclick=()=>{if(tRun)return;dSt.i++;if(dSt.i>=3){if(dSt.r===1){$('d-next').classList.add('hidden');$('d-r2').classList.remove('hidden');}else{$('d-next').classList.add('hidden');$('d-fin').classList.remove('hidden');}}tMs=0;sync();updateUI();};
    $('d-r2').onclick=()=>{dSt.r=2;dSt.i=0;tMs=0;$('d-r2').classList.add('hidden');$('d-next').classList.remove('hidden');log('進R2');sync();updateUI();};
    $('d-fin').onclick=()=>{if(!confirm('結算？'))return;let s=tm.map(t=>({t,s:gd.d[t][0]+gd.d[t][1]})).filter(x=>x.s>0).sort((a,b)=>a.s-b.s);if(s.length<3)return alert('未完成');w[s[0].t]++;fSt.d=true;log('趣味結算');sync();updateUI();};

    // 三分事件
    function build3Pt(){
      let h=''; tm.forEach(t=>{ h+=`<div class="bg-gray-800/50 p-4 rounded text-center"><h4 class="font-bold text-${t==='A'?'blue':t==='B'?'red':'green'}-400 mb-2">Team ${t}</h4><div class="grid grid-cols-5 gap-1 mb-2">`;
        for(let i=0;i<10;i++) h+=`<input type="number" class="input-base p-1 text-sm" value="${gd.p3.r1[t].p[i]||''}" oninput="gd.p3.r1['${t}'].p[${i}]=parseInt(this.value)||0;gd.p3.r1['${t}'].t=gd.p3.r1['${t}'].p.reduce((a,b)=>a+b,0);set('p3t-${t}',gd.p3.r1['${t}'].t);sync();">`;
        h+=`</div><b id="p3t-${t}">${gd.p3.r1[t].t}</b> 分</div>`; }); $('pt-inputs').innerHTML=h;
    } build3Pt();
    $('pt-r1-fin').onclick=()=>{
      let s=tm.map(t=>({t,s:gd.p3.r1[t].t})).sort((a,b)=>b.s-a.s);
      if(s[1].s===s[2].s){
        let m=document.createElement('div');m.className='modal-overlay';
        m.innerHTML=`<div class="bg-gray-900 p-6 rounded-xl w-80 text-center"><h2 class="text-xl font-bold text-red-500 mb-4">平手！手動選2隊</h2>${s.map(x=>`<label class="block mb-2 text-left"><input type="checkbox" class="t-cb" value="${x.t}"> Team ${x.t} (${x.s})</label>`).join('')}<button class="btn-primary mt-4" onclick="let c=Array.from(document.querySelectorAll('.t-cb:checked')).map(x=>x.value);if(c.length!==2)return alert('選2隊');gd.p3.f.q=c;this.closest('.modal-overlay').remove();build3f();">確認</button></div>`; document.body.appendChild(m);
      }else{gd.p3.f.q=[s[0].t,s[1].t];build3f();}
    };
    function build3f(){ $('pt-r1').classList.add('hidden');$('pt-fin').classList.remove('hidden'); let q=gd.p3.f.q;
      let h=''; q.forEach(t=>{ h+=`<div class="bg-gray-800/50 p-4 rounded text-center"><h4 class="font-bold text-yellow-400 mb-2">Team ${t}</h4><div class="grid grid-cols-5 gap-1 mb-2">`;
      for(let i=0;i<10;i++) h+=`<input type="number" class="input-base p-1 text-sm" value="${gd.p3.f.t[t]?.p[i]||''}" oninput="if(!gd.p3.f.t['${t}'])gd.p3.f.t['${t}']={p:[],t:0};gd.p3.f.t['${t}'].p[${i}]=parseInt(this.value)||0;gd.p3.f.t['${t}'].t=gd.p3.f.t['${t}'].p.reduce((a,b)=>a+b,0);set('p3ft-${t}',gd.p3.f.t['${t}'].t);sync();">`;
      h+=`</div><b id="p3ft-${t}">${gd.p3.f.t[t]?.t||0}</b> 分</div>`; }); $('pt-f-inputs').innerHTML=h; sync(); }
    $('pt-f-fin').onclick=()=>{if(!confirm('結算？'))return;let q=gd.p3.f.q,s1=gd.p3.f.t[q[0]]?.t||0,s2=gd.p3.f.t[q[1]]?.t||0;w[s1>=s2?q[0]:q[1]]++;fSt.p3=true;log('三分結算');sync();updateUI();};

    // 五五事件
    document.querySelectorAll('.f-match').forEach(b=>b.onclick=()=>{if(fRun)return alert('請先暫停');document.querySelectorAll('.f-match').forEach(x=>x.classList.remove('active'));b.classList.add('active');fC=b.dataset.m;updateUI();sync();});
    $('f-toggle').onclick=()=>{if(fRun){fRun=false;clearInterval(fInt);log('暫停5v5');sync();updateUI();}else{let mC=fM[fC];if(mC.h===2&&mC.t2===0)return;fRun=true;log('開始5v5');fInt=setInterval(()=>{if(mC.h===1){mC.t1--;if(mC.t1<=0){fRun=false;clearInterval(fInt);mC.h=2;alert('上半場完');}}else{mC.t2--;if(mC.t2<=0){fRun=false;clearInterval(fInt);alert('全場完');}}sync();updateUI();},1000);updateUI();}};
    function addF(i,p){let mC=fM[fC];if(i===1)mC.s1=Math.max(0,mC.s1+p);else mC.s2=Math.max(0,mC.s2+p);log(`5v5 T${i}加${p}`);sync();updateUI();}
    function resF(){if(confirm('歸零？')){fM[fC].s1=0;fM[fC].s2=0;log('5v5歸零');sync();updateUI();}}
    $('f-fin').onclick=()=>{if(!confirm('結算本場？'))return;let mC=fM[fC],t1=fC[0].toUpperCase(),t2=fC[1].toUpperCase();gd.f[t1]+=mC.s1;gd.f[t2]+=mC.s2;fRun=false;clearInterval(fInt);let o=['ab','ac','bc'],idx=o.indexOf(fC);if(idx<2){fC=o[idx+1];document.querySelectorAll('.f-match').forEach(x=>x.classList.remove('active'));document.querySelector(`[data-m="${fC}"]`).classList.add('active');}else{let s=tm.map(t=>({t,s:gd.f[t]})).sort((a,b)=>b.s-a.s);w[s[0].t]++;fSt.f=true;log('五五結算');}sync();updateUI();};
    function forceUnlock(){if(prompt('密碼')==='admin'){fSt.u=true;log('解鎖頒獎');sync();updateUI();}}

    setTimeout(()=>updateUI(),100);
  </script>
</body>
</html>
