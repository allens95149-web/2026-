<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 英美回娘家籃球交流賽</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { font-family: sans-serif; overflow: hidden; background: linear-gradient(135deg, #050812 0%, #001F3F 100%); color: #fff; }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px; }
    .glass-card-lg { background: rgba(10, 15, 31, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 20px; }
    .btn-primary { background: linear-gradient(135deg, #FFD700 0%, #ffc107 100%); color: #000; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .btn-danger { background: #ef4444; color: #fff; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .btn-success { background: #22c55e; color: #000; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-base { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 0.75rem; border-radius: 8px; width: 100%; text-align: center; font-size: 1.2rem; font-weight: bold; }
    .score-display { font-size: 2.5rem; font-weight: 900; color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    nav { display: flex; overflow-x: auto; padding-bottom: 5px; } nav::-webkit-scrollbar { display: none; }
    .nav-tab { white-space: nowrap; padding: 0.75rem 1.5rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 600; cursor: pointer; }
    .nav-tab.active { background: #FFD700; color: #000; }
    .hidden-page { display: none !important; }
    .staff-only { display: none !important; } .player-only { display: none !important; }
    body.staff-mode .staff-only { display: flex !important; } body.staff-mode main.staff-only { display: block !important; }
    body.player-mode { background: #f8fafc !important; color: #0f172a; }
    body.player-mode .player-only { display: flex !important; } body.player-mode main.player-only { display: block !important; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; items: center; justify-content: center; }
  </style>
</head>
<body class="h-full w-full staff-mode">

  <div id="role-overlay" class="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center">
   <div class="glass-card-lg p-8 max-w-md w-full mx-4 animate-slideInUp text-center">
    <h2 class="text-3xl font-bold text-yellow-400 mb-2">籃球交流賽</h2>
    <p class="text-gray-400 mb-8">系統入口</p>
    <div class="space-y-4">
        <button id="role-staff" class="w-full btn-primary py-4 text-xl">👨‍💻 工作人員 (寫入)</button> 
        <button id="role-player" class="w-full btn-secondary py-4 text-xl">🏀 球員觀看 (唯讀)</button>
    </div>
   </div>
  </div>

  <header class="staff-only bg-black/40 border-b border-white/10 px-4 py-3 shrink-0 justify-between items-center">
    <h1 class="text-lg font-bold text-yellow-400">🏀 後台管理系統</h1>
    <div class="text-xs font-bold text-green-500 animate-blink border border-green-500/30 px-3 py-1 rounded-full">🟢 已連線</div>
  </header>
  <nav class="staff-only bg-black/20 border-b border-white/10 px-4 py-2 shrink-0 gap-2" id="staff-nav">
       <button class="nav-tab active" data-page="0">首頁/日誌</button> 
       <button class="nav-tab" data-page="1">趣味競賽</button> 
       <button class="nav-tab" data-page="2">三分球</button> 
       <button class="nav-tab" data-page="3">五五賽</button> 
       <button class="nav-tab" data-page="4">頒獎台</button>
  </nav>

  <main id="staff-main" class="staff-only flex-1 overflow-auto p-4 w-full max-w-7xl mx-auto">
     <section id="page-0" class="page">
      <div class="glass-card p-6 mb-6">
       <h3 class="text-2xl font-bold text-yellow-400 mb-4 text-center">🏆 隊伍總積分</h3>
       <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
        <div class="bg-blue-500/20 p-4 rounded"><div class="text-gray-300 mb-2">Team A</div><div class="score-display" id="dash-a">0</div></div>
        <div class="bg-red-500/20 p-4 rounded"><div class="text-gray-300 mb-2">Team B</div><div class="score-display" id="dash-b">0</div></div>
        <div class="bg-green-500/20 p-4 rounded"><div class="text-gray-300 mb-2">Team C</div><div class="score-display" id="dash-c">0</div></div>
       </div>
      </div>
      <div class="glass-card p-4 border border-gray-600">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-yellow-400">📝 操作日誌</h3>
            <button class="btn-secondary text-xs p-2" onclick="clearLog()">清除</button>
        </div>
        <div id="sys-logs" class="h-48 overflow-y-auto font-mono text-sm text-gray-400 space-y-1">系統啟動...</div>
      </div>
     </section>

     <section id="page-1" class="page hidden-page">
      <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-yellow-400">🎲 趣味競賽</h2>
          <button class="btn-danger p-2" onclick="resetData('dice')">🧹 清除重置</button>
      </div>
      <div class="glass-card p-6 mb-6 text-center">
         <h3 id="dice-team" class="text-3xl font-bold text-yellow-400 mb-2">Team A (第1輪)</h3>
         <div id="dice-timer" class="text-6xl text-yellow-400 font-mono mb-6">00:00.0</div>
         <div class="flex gap-2 justify-center mb-6">
             <button id="d-start" class="btn-primary w-32">▶️ 開始</button>
             <button id="d-stop" class="btn-secondary w-32" disabled>⏹️ 停止</button>
         </div>
         <button id="d-next" class="btn-primary">⏭️ 下一隊</button>
         <button id="d-r2" class="btn-success hidden">▶️ 第二輪</button>
         <button id="d-fin" class="btn-danger hidden">🏆 結算成績</button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="dice-scores"></div>
     </section>

     <section id="page-2" class="page hidden-page">
      <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-yellow-400">🧱 三分球</h2>
          <button class="btn-danger p-2" onclick="resetData('3pt')">🧹 清除重置</button>
      </div>
      <div id="pt-r1">
          <button id="pt-r1-fin" class="btn-success w-full mb-4">✅ 結算小組賽 (取前兩名)</button>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="pt-inputs"></div>
      </div>
      <div id="pt-fin" class="hidden">
          <button id="pt-f-fin" class="btn-danger w-full mb-4">🏆 結算決賽</button>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="pt-f-inputs"></div>
      </div>
     </section>

     <section id="page-3" class="page hidden-page">
      <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-yellow-400">⚔️ 五五賽</h2>
          <button class="btn-danger p-2" onclick="resetData('5v5')">🧹 清除重置</button>
      </div>
      <div class="flex gap-2 justify-center mb-4">
        <button class="btn-secondary f-match active" data-m="ab">A vs B</button>
        <button class="btn-secondary f-match" data-m="ac">A vs C</button>
        <button class="btn-secondary f-match" data-m="bc">B vs C</button>
      </div>
      <div class="glass-card p-6 text-center mb-4">
         <div class="text-xl text-gray-400 mb-2" id="f-half">上半場</div>
         <div class="text-6xl text-yellow-400 font-mono mb-4" id="f-time">10:00</div>
         <button id="f-toggle" class="btn-primary w-full mb-6">▶️ 啟動/暫停計時</button>
         
         <div class="flex justify-between items-center">
             <div class="flex-1"><div id="f-t1" class="text-2xl text-blue-
